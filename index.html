<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Farm Builder</title>
    <style>
        body { margin: 0; padding: 0; background: #2c3e50; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; touch-action: none; }
        #ui {
            position: absolute; bottom: 20px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 10px; pointer-events: none;
        }
        .btn {
            background: #f1c40f; border: 4px solid #d35400; border-radius: 12px;
            padding: 15px; font-weight: bold; font-size: 14px; color: #d35400;
            pointer-events: auto; box-shadow: 0 4px 0 #a04000; active-transform: translateY(2px);
        }
        .btn.active { background: #fff; border-color: #27ae60; color: #27ae60; }
        #stats {
            position: absolute; top: 10px; left: 10px; color: white;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="stats">💰 <span id="money">100</span> | 🌾 <span id="crops">0</span></div>

    <div id="ui">
        <div id="move-btn" class="btn active" onclick="setMode('move')">🚶 MOVE</div>
        <div id="plant-btn" class="btn" onclick="setMode('plant')">🌱 PLANT ($10)</div>
        <div id="build-btn" class="btn" onclick="setMode('build')">🏠 BUILD ($50)</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const moneyEl = document.getElementById('money');
    const cropsEl = document.getElementById('crops');

    // Game Constants
    const TILE_SIZE = 60;
    const GRID_SIZE = 15; // 15x15 map
    const PLAYER_SPEED = 4;

    // Game State
    let mode = 'move';
    let money = 100;
    let inventory = { crops: 0 };
    let camera = { x: 0, y: 0 };
    
    const player = {
        x: (GRID_SIZE * TILE_SIZE) / 2,
        y: (GRID_SIZE * TILE_SIZE) / 2,
        targetX: (GRID_SIZE * TILE_SIZE) / 2,
        targetY: (GRID_SIZE * TILE_SIZE) / 2,
        color: '#e67e22'
    };

    // Initialize Grid
    const grid = [];
    for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
            grid.push({
                x, y,
                type: 'grass', // grass, dirt, crop, building
                growth: 0,
                buildingType: null
            });
        }
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    // Touch Handling
    canvas.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const touchX = touch.clientX - camera.x;
        const touchY = touch.clientY - camera.y;

        const gridX = Math.floor(touchX / TILE_SIZE);
        const gridY = Math.floor(touchY / TILE_SIZE);
        const tile = grid.find(t => t.x === gridX && t.y === gridY);

        if (!tile) return;

        if (mode === 'move') {
            player.targetX = (gridX * TILE_SIZE) + TILE_SIZE / 2;
            player.targetY = (gridY * TILE_SIZE) + TILE_SIZE / 2;
        } else if (mode === 'plant' && tile.type === 'grass' && money >= 10) {
            tile.type = 'crop';
            tile.growth = 0;
            money -= 10;
        } else if (mode === 'build' && tile.type === 'grass' && money >= 50) {
            tile.type = 'building';
            money -= 50;
        } else if (tile.type === 'crop' && tile.growth >= 100) {
            tile.type = 'grass';
            tile.growth = 0;
            inventory.crops++;
            money += 25; // Sell profit
        }
        
        updateUI();
    });

    function setMode(newMode) {
        mode = newMode;
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        document.getElementById(newMode + '-btn').classList.add('active');
    }

    function updateUI() {
        moneyEl.innerText = money;
        cropsEl.innerText = inventory.crops;
    }

    // Main Game Loop
    function update() {
        // Character Movement
        const dx = player.targetX - player.x;
        const dy = player.targetY - player.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        if (dist > PLAYER_SPEED) {
            player.x += (dx / dist) * PLAYER_SPEED;
            player.y += (dy / dist) * PLAYER_SPEED;
        } else {
            player.x = player.targetX;
            player.y = player.targetY;
        }

        // Camera Follow
        camera.x = -player.x + canvas.width / 2;
        camera.y = -player.y + canvas.height / 2;

        // Crop Growth Logic
        grid.forEach(tile => {
            if (tile.type === 'crop' && tile.growth < 100) {
                tile.growth += 0.1; // Slow growth
            }
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        ctx.translate(camera.x, camera.y);

        // Draw Grid
        grid.forEach(tile => {
            const tx = tile.x * TILE_SIZE;
            const ty = tile.y * TILE_SIZE;

            // Draw Base Tile
            ctx.fillStyle = '#2ecc71'; // Grass
            ctx.fillRect(tx, ty, TILE_SIZE - 2, TILE_SIZE - 2);

            if (tile.type === 'crop') {
                ctx.fillStyle = tile.growth >= 100 ? '#f1c40f' : '#27ae60';
                const size = (tile.growth / 100) * (TILE_SIZE - 20);
                ctx.fillRect(tx + (TILE_SIZE-size)/2, ty + (TILE_SIZE-size)/2, size, size);
            } else if (tile.type === 'building') {
                ctx.fillStyle = '#7f8c8d'; // Building base
                ctx.fillRect(tx + 5, ty + 5, TILE_SIZE - 10, TILE_SIZE - 10);
                ctx.fillStyle = '#c0392b'; // Roof
                ctx.beginPath();
                ctx.moveTo(tx + 5, ty + 20);
                ctx.lineTo(tx + TILE_SIZE/2, ty + 5);
                ctx.lineTo(tx + TILE_SIZE - 5, ty + 20);
                ctx.fill();
            }
        });

        // Draw Player
        ctx.fillStyle = player.color;
        ctx.beginPath();
        ctx.arc(player.x, player.y, 15, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.restore();

        update();
        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>
