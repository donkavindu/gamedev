<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Village Architect Pro</title>
    <style>
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; touch-action: none; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #1e3d1a; 
            position: fixed; font-family: 'Segoe UI', sans-serif;
        }
        canvas { display: block; width: 100vw; height: 100vh; z-index: 1; }

        /* HUD */
        #hud {
            position: absolute; top: env(safe-area-inset-top, 10px);
            width: 100%; display: flex; justify-content: center; gap: 15px;
            pointer-events: none; z-index: 10;
        }
        .stat {
            background: rgba(45, 20, 10, 0.92); color: #f1c40f; padding: 10px 20px;
            border-radius: 25px; border: 2px solid #8b4513; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4); font-size: 18px;
        }

        /* Full Screen Catalog */
        #build-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 100;
            display: none; flex-direction: column; align-items: center;
            padding: 40px 20px; color: white;
        }
        #build-screen.active { display: flex; }
        #build-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 12px; width: 100%; max-width: 500px; 
            overflow-y: auto; padding: 10px;
        }
        .building-card {
            background: #f5deb3; border-radius: 12px; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            border: 3px solid #8b4513; color: #333;
        }
        .building-card .icon { font-size: 32px; }
        .building-card .name { font-size: 10px; font-weight: bold; margin-top: 4px; text-align: center; }
        .building-card .price { color: #27ae60; font-weight: bold; font-size: 12px; }

        /* Approval UI */
        #confirm-layer {
            position: absolute; bottom: 120px; width: 100%;
            display: none; justify-content: center; gap: 40px; z-index: 50;
        }
        .action-circle {
            width: 75px; height: 75px; border-radius: 50%; border: 4px solid white;
            display: flex; align-items: center; justify-content: center; font-size: 35px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .btn-confirm { background: #2ecc71; }
        .btn-cancel { background: #e74c3c; }

        /* Controls */
        #controls {
            position: absolute; bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
            width: 100%; display: flex; justify-content: center; gap: 12px;
            z-index: 10;
        }
        .btn {
            width: 75px; height: 75px; border-radius: 50%; border: 4px solid #fff;
            color: white; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; font-size: 13px; font-weight: bold;
            box-shadow: 0 5px 0 rgba(0,0,0,0.3);
        }
        .btn-p { background: #2ecc71; }
        .btn-h { background: #f1c40f; color: #8b4513; }
        .btn-b { background: #8b4513; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="stat">💰 $<span id="m-val">500</span></div>
        <div class="stat">📦 <span id="i-val">0</span></div>
    </div>

    <div id="confirm-layer">
        <div class="action-circle btn-cancel" onclick="cancelPlacement()">✕</div>
        <div class="action-circle btn-confirm" onclick="confirmPlacement()">✓</div>
    </div>

    <div id="build-screen">
        <h2 style="color: #f1c40f; margin-bottom: 10px;">Village Catalog</h2>
        <div id="build-grid"></div>
        <button style="margin-top:20px; padding:12px 30px; background:#666; border:none; color:white; border-radius:20px;" onclick="closeBuildMenu()">BACK TO FARM</button>
    </div>

    <div id="controls">
        <div class="btn btn-p" onclick="act('plant')">🌱<span>Sow</span></div>
        <div class="btn btn-h" onclick="act('harvest')">🧺<span>Pick</span></div>
        <div class="btn btn-b" onclick="openBuildMenu()">🏗️<span>Build</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const TILE_SIZE = 80;
    const GRID_SIZE = 30; 
    const WORLD_SIZE = TILE_SIZE * GRID_SIZE;
    
    let money = 500;
    let inv = 0;
    let camera = { x: 0, y: 0 };
    
    let selectedItem = null; // Stores building or path
    let previewPos = null;   // {gx, gy}
    
    const player = { 
        x: WORLD_SIZE/2, y: WORLD_SIZE/2, 
        tx: WORLD_SIZE/2, ty: WORLD_SIZE/2, 
        gx: 0, gy: 0, 
        speed: 5
    };

    const catalog = [
        { id: 'path', name: 'Dirt Road', price: 5, icon: '👣', type: 'path' },
        { id: 'house', name: 'Farmhouse', price: 50, icon: '🏡', type: 'build' },
        { id: 'barn', name: 'Barn', price: 150, icon: '🏚️', type: 'build' },
        { id: 'windmill', name: 'Windmill', price: 200, icon: '🎡', type: 'build' },
        { id: 'well', name: 'Well', price: 40, icon: '⛲', type: 'build' },
        { id: 'coop', name: 'Coop', price: 80, icon: '🛖', type: 'build' },
        { id: 'silo', name: 'Silo', price: 120, icon: '🗼', type: 'build' },
        { id: 'green', name: 'Greenhouse', price: 300, icon: '🏠', type: 'build' },
        { id: 'shed', name: 'Shed', price: 30, icon: '🏚', type: 'build' },
        { id: 'tower', name: 'Water Tower', price: 250, icon: '🏗️', type: 'build' },
        { id: 'apiary', name: 'Apiary', price: 90, icon: '🐝', type: 'build' },
        { id: 'orchard', name: 'Orchard', price: 60, icon: '🌳', type: 'build' },
        { id: 'vine', name: 'Vineyard', price: 100, icon: '🍇', type: 'build' },
        { id: 'fountain', name: 'Fountain', price: 500, icon: '⛲', type: 'build' },
        { id: 'statue', name: 'Statue', price: 1000, icon: '🗿', type: 'build' }
    ];

    const grid = Array.from({length: GRID_SIZE * GRID_SIZE}, (_, i) => ({
        x: i % GRID_SIZE, y: Math.floor(i / GRID_SIZE),
        type: 'grass', growth: 0, icon: '',
        color: (Math.floor(i / GRID_SIZE) + (i % GRID_SIZE)) % 2 === 0 ? '#4eb351' : '#45a848'
    }));

    const buildGrid = document.getElementById('build-grid');
    catalog.forEach(item => {
        const card = document.createElement('div');
        card.className = 'building-card';
        card.innerHTML = `<div class="icon">${item.icon}</div><div class="name">${item.name}</div><div class="price">$${item.price}</div>`;
        card.onclick = () => {
            closeBuildMenu();
            selectedItem = item;
            document.getElementById('confirm-layer').style.display = 'flex';
            previewPos = {gx: player.gx, gy: player.gy};
        };
        buildGrid.appendChild(card);
    });

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    canvas.addEventListener('touchstart', (e) => {
        const t = e.touches[0];
        const wx = t.clientX - camera.x;
        const wy = t.clientY - camera.y;
        const gx = Math.floor(wx / TILE_SIZE);
        const gy = Math.floor(wy / TILE_SIZE);

        if (selectedItem) {
            previewPos = { gx, gy };
        } else {
            player.tx = Math.max(30, Math.min(wx, WORLD_SIZE - 30));
            player.ty = Math.max(30, Math.min(wy, WORLD_SIZE - 30));
        }
    });

    function getTile(gx, gy) {
        if(gx < 0 || gx >= GRID_SIZE || gy < 0 || gy >= GRID_SIZE) return null;
        return grid[gy * GRID_SIZE + gx];
    }

    function isWalkable(wx, wy) {
        const gx = Math.floor(wx / TILE_SIZE);
        const gy = Math.floor(wy / TILE_SIZE);
        const tile = getTile(gx, gy);
        return tile && tile.type !== 'building';
    }

    function cancelPlacement() {
        selectedItem = null; previewPos = null;
        document.getElementById('confirm-layer').style.display = 'none';
    }

    function confirmPlacement() {
        const tile = getTile(previewPos.gx, previewPos.gy);
        if (tile && tile.type === 'grass' && money >= selectedItem.price) {
            tile.type = (selectedItem.id === 'path') ? 'path' : 'building';
            tile.icon = selectedItem.icon;
            money -= selectedItem.price;
            updateUI();
            cancelPlacement();
        }
    }

    function openBuildMenu() { document.getElementById('build-screen').classList.add('active'); }
    function closeBuildMenu() { document.getElementById('build-screen').classList.remove('active'); }

    function act(type) {
        const tile = getTile(player.gx, player.gy);
        if(!tile) return;
        if(type === 'plant' && tile.type === 'grass' && money >= 10) {
            tile.type = 'crop'; tile.growth = 0; money -= 10;
        } else if(type === 'harvest' && tile.type === 'crop' && tile.growth >= 100) {
            tile.type = 'grass'; money += 25; inv++;
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('m-val').innerText = money;
        document.getElementById('i-val').innerText = inv;
    }

    function update() {
        const dx = player.tx - player.x;
        const dy = player.ty - player.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        if(dist > player.speed) {
            const nx = player.x + (dx/dist) * player.speed;
            const ny = player.y + (dy/dist) * player.speed;
            if(isWalkable(nx, player.y)) player.x = nx;
            if(isWalkable(player.x, ny)) player.y = ny;
        } else { player.x = player.tx; player.y = player.ty; }

        player.gx = Math.floor(player.x / TILE_SIZE);
        player.gy = Math.floor(player.y / TILE_SIZE);

        camera.x = Math.max(Math.min(0, -player.x + canvas.width/2), -(WORLD_SIZE - canvas.width));
        camera.y = Math.max(Math.min(0, -player.y + canvas.height/2), -(WORLD_SIZE - canvas.height));
        grid.forEach(t => { if(t.type === 'crop' && t.growth < 100) t.growth += 0.12; });
    }

    function draw() {
        ctx.fillStyle = '#1e3d1a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save(); ctx.translate(camera.x, camera.y);

        grid.forEach(t => {
            const tx = t.x * TILE_SIZE; const ty = t.y * TILE_SIZE;
            if (tx + TILE_SIZE + camera.x < 0 || tx + camera.x > canvas.width || ty + TILE_SIZE + camera.y < 0 || ty + camera.y > canvas.height) return;

            if (t.type === 'path') { ctx.fillStyle = '#c2b280'; ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE); }
            else { ctx.fillStyle = t.color; ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE); }

            ctx.textAlign = 'center';
            if(t.type === 'crop') {
                const sz = 15 + t.growth * 0.4; ctx.font = `${sz}px Arial`;
                ctx.fillText(t.growth >= 100 ? '🌾' : '🌱', tx+TILE_SIZE/2, ty+TILE_SIZE/2 + 10);
            } else if(t.type === 'building') {
                ctx.font = '55px Arial'; ctx.fillText(t.icon, tx+TILE_SIZE/2, ty+TILE_SIZE/2 + 20);
            }
        });

        // GHOST PREVIEW (Works for Road AND Buildings)
        if (selectedItem && previewPos) {
            const ptx = previewPos.gx * TILE_SIZE;
            const pty = previewPos.gy * TILE_SIZE;
            ctx.save();
            ctx.globalAlpha = 0.4;
            if (selectedItem.id === 'path') {
                ctx.fillStyle = '#c2b280'; ctx.fillRect(ptx, pty, TILE_SIZE, TILE_SIZE);
            } else {
                ctx.font = '55px Arial'; ctx.textAlign = 'center';
                ctx.fillText(selectedItem.icon, ptx + TILE_SIZE/2, pty + TILE_SIZE/2 + 20);
            }
            ctx.restore();
            ctx.strokeStyle = 'white'; ctx.lineWidth = 3; ctx.strokeRect(ptx+4, pty+4, TILE_SIZE-8, TILE_SIZE-8);
        }

        ctx.strokeStyle = '#5d4037'; ctx.lineWidth = 15; ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);
        ctx.font = '55px Arial'; ctx.textAlign = 'center';
        ctx.fillText('👨‍🌾', player.x, player.y + 15);

        ctx.restore();
        update(); requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
