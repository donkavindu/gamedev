<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Village Architect: Ultra Realism</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --brown: #3e2723; 
            --light-brown: #795548; 
            --parchment: #fff3e0; 
            --gold: #ffc107; 
            --green: #1b5e20; 
            --red: #b71c1c; 
        }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; touch-action: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; position: fixed; font-family: 'Segoe UI', sans-serif; }
        
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; background: var(--green); color: white; transition: opacity 0.5s; }
        .hidden { display: none !important; }

        .panel { 
            background: rgba(45, 28, 25, 0.98); border: 4px solid var(--gold); border-radius: 25px; padding: 30px; 
            width: 90%; max-width: 400px; text-align: center; box-shadow: 0 15px 45px rgba(0,0,0,0.8);
        }

        h1 { font-size: 2.2rem; color: var(--gold); margin-bottom: 20px; letter-spacing: 2px; text-shadow: 2px 2px 4px black; }

        .btn-game { 
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 50px; border: none; 
            font-size: 1.1rem; font-weight: bold; cursor: pointer; color: white; transition: 0.2s;
            box-shadow: 0 5px 0 rgba(0,0,0,0.4);
        }
        .btn-green { background: #2e7d32; }
        .btn-brown { background: #5d4037; }

        .input-field {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--gold);
            background: rgba(0,0,0,0.3); color: white; font-size: 1rem;
        }

        #hud { position: absolute; top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10; gap: 10px; }
        .stat-box { background: rgba(0,0,0,0.8); padding: 12px 25px; border-radius: 30px; border: 1px solid var(--gold); color: var(--gold); font-weight: bold; display: flex; gap: 25px; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        /* User Profile & Logout Styles */
        #user-profile { position: absolute; top: 20px; right: 20px; z-index: 100; display: flex; flex-direction: column; align-items: flex-end; pointer-events: auto; }
        .user-icon { 
            width: 48px; height: 48px; background: var(--brown); border: 2px solid var(--gold); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); font-size: 22px; color: var(--gold);
        }
        #logout-dropdown { 
            margin-top: 10px; background: rgba(0,0,0,0.9); border: 2px solid var(--gold); 
            border-radius: 15px; padding: 10px; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }
        .btn-logout { 
            background: var(--red); color: white; border: none; padding: 10px 20px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; 
        }
        .btn-logout:active { transform: scale(0.95); }

        #xp-bar-container { width: 220px; height: 14px; background: #111; border-radius: 10px; border: 1px solid #444; overflow: hidden; }
        #xp-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #4caf50, #8bc34a); box-shadow: 0 0 10px rgba(76, 175, 80, 0.5); }

        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 10; }
        .ctrl-btn { width: 75px; height: 75px; border-radius: 22px; border: 2px solid rgba(255,255,255,0.4); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        .full-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2000; display: none; flex-direction: column; align-items: center; padding: 40px 20px; overflow-y: auto; }
        .grid-view { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 420px; }
        .card { background: var(--parchment); border-radius: 15px; padding: 12px; border: 3px solid var(--brown); color: #333; text-align: center; position: relative; font-weight: bold; }
        .card.locked { background: #78909c; opacity: 0.7; }
        .lock-tag { position: absolute; top: -8px; right: -8px; background: var(--red); color: white; padding: 3px 8px; border-radius: 6px; font-size: 11px; }

        #confirm-bar { position: absolute; bottom: 130px; width: 100%; display: none; justify-content: center; gap: 40px; z-index: 50; }
        .conf-btn { width: 70px; height: 70px; border-radius: 50%; border: 4px solid white; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        #gameCanvas { display: block; background: #1b5e20; }
        
        #loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; display:none; justify-content:center; align-items:center; color:white; font-weight:bold; }
    </style>
</head>
<body>

    <div id="loading-overlay">SYNCING WITH CLOUD...</div>

    <div id="screen-intro" class="screen">
        <div class="panel">
            <h1>RURAL<br>ARCHITECT</h1>
            <button class="btn-game btn-green" onclick="showAuth()">START PROJECT</button>
            <button class="btn-game btn-brown" onclick="startGame(true)">GUEST ARCHITECT</button>
        </div>
    </div>

    <div id="screen-auth" class="screen hidden">
        <div class="panel">
            <h2 id="auth-title" style="color:var(--gold)">Identity</h2>
            <input type="email" id="email" class="input-field" placeholder="Email Address">
            <input type="password" id="pass" class="input-field" placeholder="Password">
            <button class="btn-game btn-green" id="auth-btn" onclick="handleAuth()">CONTINUE</button>
            <button style="background:none; border:none; color:white; text-decoration:underline; cursor:pointer;" onclick="toggleAuth()" id="auth-toggle">New? Sign Up</button>
        </div>
    </div>

    <div id="game-ui" class="hidden">
        <!-- User Profile Component -->
        <div id="user-profile">
            <div class="user-icon" onclick="toggleUserMenu()">👤</div>
            <div id="logout-dropdown">
                <button class="btn-logout" onclick="handleLogout()">LOG OUT</button>
            </div>
        </div>

        <div id="hud">
            <div class="stat-box">
                <span>LVL <span id="val-lvl">1</span></span>
                <span>$ <span id="val-mon">500</span></span>
            </div>
            <div id="xp-bar-container"><div id="xp-bar-fill"></div></div>
        </div>
        <div id="confirm-bar">
            <div class="conf-btn" style="background:var(--red)" onclick="cancelAction()">✕</div>
            <div class="conf-btn" style="background:#4caf50" onclick="confirmAction()">✓</div>
        </div>
        <div id="menu-seed" class="full-menu"><h2>NATURE CATALOG</h2><div id="grid-seed" class="grid-view"></div><br><button class="btn-game btn-brown" style="width:200px" onclick="closeMenus()">BACK</button></div>
        <div id="menu-build" class="full-menu"><h2>ARCHITECTURE</h2><div id="grid-build" class="grid-view"></div><br><button class="btn-game btn-brown" style="width:200px" onclick="closeMenus()">BACK</button></div>
        <canvas id="gameCanvas"></canvas>
        <div id="controls">
            <div class="ctrl-btn" onclick="openCatalog('seed')">PLANT</div>
            <div class="ctrl-btn" onclick="setMode('harvest')">HARVEST</div>
            <div class="ctrl-btn" onclick="openCatalog('build')">BUILD</div>
            <div class="ctrl-btn" onclick="setMode('destroy')">REMOVE</div>
        </div>
    </div>

<script>
    // --- CONFIG & CONSTANTS ---
    const TILE_SIZE = 80;
    const ROAD_COLOR = "#a1887f";
    const firebaseConfig = { 
        apiKey: "AIzaSyBk6Jfz3SfNxeHAA-fZ9y4hvhV0Na8kzk8", 
        authDomain: "gameproject-6d70b.firebaseapp.com", 
        projectId: "gameproject-6d70b", 
        storageBucket: "gameproject-6d70b.firebasestorage.app", 
        messagingSenderId: "1003439076744", 
        appId: "1:1003439076744:web:6e9977f6a656eb18efb63d" 
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();

    // --- GAME STATE ---
    let money = 500, level = 1, xp = 0, xpNext = 150, grid = [], frame = 0, isSignUp = false, gameStarted = false;
    let selectedItem = null, previewPos = { gx: 15, gy: 15 }, camera = { x: 0, y: 0 };
    const player = { x: 1200, y: 1200, tx: 1200, ty: 1200, gx: 15, gy: 15, speed: 4, isMoving: false };

    const seeds = [
        { id: 'wheat', name: 'Wheat', price: 5, sale: 15, req: 1, xp: 10 },
        { id: 'corn', name: 'Corn', price: 10, sale: 30, req: 2, xp: 20 },
        { id: 'apple', name: 'Apple Tree', price: 120, sale: 60, req: 4, xp: 100, tree: true }
    ];
    const builds = [
        { id: 'plot', name: 'Farm Plot', price: 5, req: 1, xp: 5 },
        { id: 'path', name: 'Dirt Road', price: 2, req: 1, xp: 2 },
        { id: 'house', name: 'Farm House', price: 150, req: 1, xp: 100 },
        { id: 'well', name: 'Stone Well', price: 60, req: 2, xp: 50 },
        { id: 'greenhouse', name: 'Greenhouse', price: 300, req: 3, xp: 250 },
        { id: 'barn', name: 'Classic Barn', price: 500, req: 5, xp: 400 },
        { id: 'windmill', name: 'Windmill', price: 800, req: 6, xp: 700 },
        { id: 'watertower', name: 'Water Tower', price: 1200, req: 8, xp: 1000 },
        { id: 'silo', name: 'Grain Silo', price: 2000, req: 10, xp: 1800 }
    ];

    // --- AUTO-LOGIN FIX ---
    auth.onAuthStateChanged((user) => {
        if (user && !gameStarted) {
            startGame(false);
        }
    });

    // --- SAVE & LOAD SYSTEM ---
    async function saveGameData() {
        const user = auth.currentUser;
        if (!user) return;
        const gridData = grid.map(t => ({ t: t.type, g: Math.floor(t.growth), c: t.crop ? t.crop.id : null }));
        try {
            await db.collection("saves").doc(user.uid).set({ money, level, xp, xpNext, grid: gridData, savedAt: Date.now() });
        } catch (err) { console.error("Save Failed:", err); }
    }

    async function loadGameData() {
        const user = auth.currentUser;
        if (!user) return false;
        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            const doc = await db.collection("saves").doc(user.uid).get();
            if (doc.exists) {
                const data = doc.data();
                money = data.money; level = data.level; xp = data.xp; xpNext = data.xpNext || 150;
                grid = data.grid.map((t, i) => ({
                    x: i % 30, y: Math.floor(i / 30), type: t.t, growth: t.g,
                    crop: t.c ? seeds.find(s => s.id === t.c) : null,
                    grassOffset: Math.random() * 10
                }));
                document.getElementById('loading-overlay').style.display = 'none';
                return true;
            }
        } catch (err) { console.error("Load Failed:", err); }
        document.getElementById('loading-overlay').style.display = 'none';
        return false;
    }

    // --- LOGOUT LOGIC ---
    function toggleUserMenu() {
        const menu = document.getElementById('logout-dropdown');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }

    async function handleLogout() {
        if(confirm("Exit village and log out?")) {
            try {
                await auth.signOut();
                location.reload(); // Refresh to clear state and show intro screen
            } catch(err) { alert(err.message); }
        }
    }

    // --- AUTHENTICATION ---
    async function handleAuth() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(!e || !p) return alert("Enter credentials");
        document.getElementById('auth-btn').innerText = "CONNECTING...";
        try {
            if(isSignUp) await auth.createUserWithEmailAndPassword(e, p);
            else await auth.signInWithEmailAndPassword(e, p);
        } catch(err) { alert(err.message); document.getElementById('auth-btn').innerText = "CONTINUE"; }
    }

    function toggleAuth() { 
        isSignUp = !isSignUp; 
        document.getElementById('auth-title').innerText = isSignUp ? "Identity (Sign Up)" : "Identity (Login)"; 
        document.getElementById('auth-toggle').innerText = isSignUp ? "Already a member? Login" : "New? Sign Up";
    }

    async function startGame(guest) {
        if (gameStarted) return;
        document.getElementById('screen-intro').classList.add('hidden');
        document.getElementById('screen-auth').classList.add('hidden');
        document.getElementById('game-ui').classList.remove('hidden');
        resize();
        let loaded = false;
        if (!guest) loaded = await loadGameData();
        if (!loaded) {
            money = 500; level = 1; xp = 0; xpNext = 150;
            grid = Array.from({length: 900}, (_, i) => ({
                x: i % 30, y: Math.floor(i / 30), type: 'grass', growth: 100, crop: null, grassOffset: Math.random() * 10
            }));
        }
        gameStarted = true;
        updateUI();
        requestAnimationFrame(gameLoop);
    }

    // --- CORE MECHANICS ---
    function updateUI() {
        if(xp >= xpNext) { xp -= xpNext; level++; xpNext = Math.floor(xpNext * 1.6); saveGameData(); }
        document.getElementById('val-lvl').innerText = level;
        document.getElementById('val-mon').innerText = money;
        document.getElementById('xp-bar-fill').style.width = (xp/xpNext*100) + "%";
    }

    function openCatalog(type) {
        const container = document.getElementById('grid-' + type);
        container.innerHTML = '';
        (type === 'seed' ? seeds : builds).forEach(item => {
            const isLocked = level < item.req;
            const card = document.createElement('div');
            card.className = `card ${isLocked ? 'locked' : ''}`;
            card.innerHTML = `${isLocked ? '<div class="lock-tag">Lvl '+item.req+'</div>' : ''}${item.name}<br><span style="color:#555">$${item.price}</span>`;
            if(!isLocked) card.onclick = () => { closeMenus(); selectedItem = {...item, isSeed: type === 'seed', mode: 'place'}; document.getElementById('confirm-bar').style.display = 'flex'; };
            container.appendChild(card);
        });
        document.getElementById('menu-' + type).style.display = 'flex';
    }

    function closeMenus() { document.querySelectorAll('.full-menu').forEach(m => m.style.display = 'none'); }
    function setMode(m) { selectedItem = { mode: m }; document.getElementById('confirm-bar').style.display = 'flex'; }
    function cancelAction() { selectedItem = null; document.getElementById('confirm-bar').style.display = 'none'; }

    function confirmAction() {
        const tile = grid[previewPos.gy * 30 + previewPos.gx];
        if(!tile) return;
        let actionTaken = false;
        if(selectedItem.mode === 'place') {
            if(money < selectedItem.price) return alert("Not enough money!");
            if(selectedItem.isSeed && tile.type === 'plot') {
                tile.type = 'crop'; tile.growth = 0; tile.crop = selectedItem; money -= selectedItem.price; actionTaken = true;
            } else if(!selectedItem.isSeed && tile.type === 'grass') {
                tile.type = selectedItem.id; money -= selectedItem.price; xp += selectedItem.xp; actionTaken = true;
            }
        } else if(selectedItem.mode === 'harvest' && tile.type === 'crop' && tile.growth >= 100) {
            money += tile.crop.sale; xp += 15;
            if(tile.crop.tree) tile.growth = 0; else { tile.type = 'plot'; tile.crop = null; }
            actionTaken = true;
        } else if(selectedItem.mode === 'destroy' && tile.type !== 'grass') {
            tile.type = 'grass'; tile.crop = null; actionTaken = true;
        }
        if(actionTaken) { updateUI(); saveGameData(); }
    }

    // --- VISUAL ENGINE ---
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);

    canvas.addEventListener('touchstart', e => {
        const t = e.touches[0];
        const wx = t.clientX - camera.x, wy = t.clientY - camera.y;
        const gx = Math.floor(wx/80), gy = Math.floor(wy/80);
        if(gx < 0 || gx >= 30 || gy < 0 || gy >= 30) return;
        if(selectedItem) { previewPos = { gx, gy }; }
        else { player.tx = wx; player.ty = wy; document.getElementById('logout-dropdown').style.display = 'none'; }
    });

    function drawHouse(x, y) {
        ctx.fillStyle = "rgba(100,100,100,0.4)";
        for(let i=0; i<3; i++) {
            const smokeX = x+55 + Math.sin(frame*0.05 + i)*5;
            const smokeY = y+10 - (i*12) - (frame % 30);
            ctx.beginPath(); ctx.arc(smokeX, smokeY, 5+i, 0, Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = "#d7ccc8"; ctx.fillRect(x+15, y+35, 50, 40);
        ctx.strokeStyle = "#a1887f"; ctx.lineWidth = 1;
        for(let i=0; i<5; i++) { ctx.beginPath(); ctx.moveTo(x+15, y+35+(i*8)); ctx.lineTo(x+65, y+35+(i*8)); ctx.stroke(); }
        ctx.fillStyle = "#5d4037"; ctx.fillRect(x+50, y+15, 10, 20);
        ctx.fillStyle = "#795548"; ctx.beginPath(); ctx.moveTo(x+10, y+35); ctx.lineTo(x+40, y+10); ctx.lineTo(x+70, y+35); ctx.fill();
        ctx.fillStyle = "#3e2723"; ctx.fillRect(x+33, y+55, 14, 20);
        ctx.fillStyle = "#81d4fa"; ctx.fillRect(x+20, y+45, 10, 10);
        ctx.strokeStyle = "white"; ctx.strokeRect(x+20, y+45, 10, 10);
    }

    function drawBarn(x, y) {
        ctx.fillStyle = "#b71c1c"; ctx.fillRect(x+10, y+25, 60, 50);
        ctx.strokeStyle = "#7f0000"; 
        for(let i=0; i<6; i++) { ctx.beginPath(); ctx.moveTo(x+10+(i*10), y+25); ctx.lineTo(x+10+(i*10), y+75); ctx.stroke(); }
        ctx.fillStyle = "#d32f2f"; ctx.beginPath(); ctx.moveTo(x+5, y+25); ctx.lineTo(x+40, y+5); ctx.lineTo(x+75, y+25); ctx.fill();
        ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.strokeRect(x+25, y+45, 30, 30);
        ctx.beginPath(); ctx.moveTo(x+25, y+45); ctx.lineTo(x+55, y+75); ctx.moveTo(x+55, y+45); ctx.lineTo(x+25, y+75); ctx.stroke();
    }

    function drawWell(x, y) {
        ctx.fillStyle = "#757575";
        for(let i=0; i<10; i++) { ctx.beginPath(); ctx.arc(x+40+Math.cos(i)*18, y+65+Math.sin(i)*8, 6, 0, Math.PI*2); ctx.fill(); }
        ctx.fillStyle = "#424242"; ctx.beginPath(); ctx.ellipse(x+40, y+65, 15, 7, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#5d4037"; ctx.fillRect(x+25, y+30, 4, 35); ctx.fillRect(x+51, y+30, 4, 35); ctx.fillRect(x+22, y+25, 36, 6);
    }

    function drawWindmill(x, y) {
        ctx.save(); ctx.translate(x + 40, y + 70);
        ctx.fillStyle = "#d7ccc8"; ctx.beginPath(); ctx.moveTo(-20, 0); ctx.lineTo(-12, -50); ctx.lineTo(12, -50); ctx.lineTo(20, 0); ctx.fill();
        ctx.strokeStyle = "#a1887f"; ctx.stroke();
        ctx.translate(0, -45); ctx.rotate(frame * 0.04);
        ctx.strokeStyle = "#5d4037"; ctx.lineWidth = 2;
        for(let i=0; i<4; i++) {
            ctx.rotate(Math.PI/2); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0, 35); ctx.stroke();
            ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.fillRect(-8, 10, 16, 20); ctx.strokeRect(-8, 10, 16, 20);
        }
        ctx.fillStyle = "#3e2723"; ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill(); ctx.restore();
    }

    function drawGreenhouse(x, y) {
        ctx.fillStyle = "rgba(129, 212, 250, 0.3)"; ctx.fillRect(x+10, y+30, 60, 40);
        ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.strokeRect(x+10, y+30, 60, 40);
        ctx.beginPath(); ctx.moveTo(x+10, y+30); ctx.lineTo(x+40, y+10); ctx.lineTo(x+70, y+30); ctx.stroke();
    }

    function drawFarmer(x, y) {
        ctx.save(); ctx.translate(x, y);
        const bob = Math.sin(frame * 0.2) * 2;
        ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.beginPath(); ctx.ellipse(0, 8, 12, 6, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#1a237e"; ctx.fillRect(-6, 0+(player.isMoving?Math.sin(frame*0.25)*5:0), 5, 10); ctx.fillRect(1, 0-(player.isMoving?Math.sin(frame*0.25)*5:0), 5, 10);
        ctx.fillStyle = "#fff"; ctx.fillRect(-9, -15+bob, 18, 12); ctx.fillStyle = "#1a237e"; ctx.fillRect(-9,-10+bob,18,10);
        ctx.fillStyle = "#ffdbac"; ctx.beginPath(); ctx.arc(0,-22+bob,7,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = "#bcaa88"; ctx.beginPath(); ctx.ellipse(0,-28+bob,15,6,0,0,Math.PI*2); ctx.fill(); ctx.fillRect(-6,-34+bob,12,7);
        ctx.restore();
    }

    function drawWheat(x, y, growth, wind) {
        ctx.save(); ctx.translate(x + 40, y + 70);
        const g = growth / 100;
        for(let i=0; i<6; i++) {
            const ox = (i - 3) * 8; const h = 40 * g; const sway = wind * (i * 0.2) * g;
            ctx.strokeStyle = g > 0.8 ? "#fbc02d" : "#9ccc65"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(ox, 0); ctx.quadraticCurveTo(ox + sway, -h/2, ox + sway*1.5, -h); ctx.stroke();
        }
        ctx.restore();
    }

    function drawCorn(x, y, growth, wind) {
        ctx.save(); ctx.translate(x + 40, y + 70);
        const g = growth / 100; const h = 60 * g; const sway = wind * g;
        ctx.strokeStyle = "#4caf50"; ctx.lineWidth = 4 * g;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(sway * 0.5, -h/2, sway, -h); ctx.stroke();
        ctx.restore();
    }

    function drawAppleTree(x, y, growth, wind) {
        ctx.save(); ctx.translate(x + 40, y + 72);
        const g = growth / 100; const h = 50 * g; const sway = wind * g;
        ctx.fillStyle = "#5d4037"; ctx.fillRect(-4*g, -h, 8*g, h);
        if(g > 0.2) {
            ctx.translate(sway, -h); ctx.fillStyle = "#2e7d32";
            const cl = (ox, oy, r) => { ctx.beginPath(); ctx.arc(ox, oy, r*g, 0, Math.PI*2); ctx.fill(); };
            cl(0, -10, 25); cl(-15, 5, 20); cl(15, 5, 20);
            if(g >= 1.0) { ctx.fillStyle = "#e53935"; [ [-10,-15], [12,-5], [-5,5] ].forEach(p => { ctx.beginPath(); ctx.arc(p[0],p[1],5,0,Math.PI*2); ctx.fill(); }); }
        }
        ctx.restore();
    }

    function drawGame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save(); ctx.translate(camera.x, camera.y);
        const wind = Math.sin(frame * 0.04) * 5;
        grid.forEach(t => {
            const tx = t.x*80, ty = t.y*80;
            if (tx + 80 < -camera.x || tx > -camera.x + canvas.width || ty + 80 < -camera.y || ty > -camera.y + canvas.height) return;
            ctx.fillStyle = (t.x + t.y) % 2 === 0 ? "#1b5e20" : "#1e6d23";
            ctx.fillRect(tx, ty, 80, 80);
            if(t.type === 'path') { ctx.fillStyle = ROAD_COLOR; ctx.fillRect(tx, ty, 80, 80); }
            else if(t.type === 'plot') { ctx.fillStyle = '#3e2723'; ctx.fillRect(tx+4, ty+4, 72, 72); }
            else if(t.type === 'crop') {
                ctx.fillStyle = '#3e2723'; ctx.fillRect(tx+4, ty+4, 72, 72);
                if(t.crop.id === 'wheat') drawWheat(tx, ty, t.growth, wind);
                else if(t.crop.id === 'corn') drawCorn(tx, ty, t.growth, wind);
                else if(t.crop.id === 'apple') drawAppleTree(tx, ty, t.growth, wind);
                if(t.growth < 100) t.growth += 0.08;
            } else if(t.type === 'house') drawHouse(tx, ty);
            else if(t.type === 'well') drawWell(tx, ty);
            else if(t.type === 'greenhouse') drawGreenhouse(tx, ty);
            else if(t.type === 'windmill') drawWindmill(tx, ty);
            else if(t.type === 'barn') drawBarn(tx, ty);
            else if(t.type === 'watertower') { ctx.fillStyle="#78909c"; ctx.fillRect(tx+25, ty+20, 30, 40); }
            else if(t.type === 'silo') { ctx.fillStyle="#90a4ae"; ctx.fillRect(tx+20, ty+10, 40, 60); }
        });
        if(selectedItem) {
            ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.setLineDash([5, 5]);
            ctx.strokeRect(previewPos.gx*80+2, previewPos.gy*80+2, 76, 76); ctx.setLineDash([]);
        }
        drawFarmer(player.x, player.y);
        ctx.restore();
    }

    function gameLoop() {
        if(!gameStarted) return;
        frame++;
        const dx = player.tx - player.x, dy = player.ty - player.y, dist = Math.sqrt(dx*dx+dy*dy);
        if(dist > 5) { player.x += (dx/dist)*player.speed; player.y += (dy/dist)*player.speed; player.isMoving = true; } 
        else { player.isMoving = false; }
        camera.x = Math.max(Math.min(0, -player.x + canvas.width/2), -(2400 - canvas.width));
        camera.y = Math.max(Math.min(0, -player.y + canvas.height/2), -(2400 - canvas.height));
        drawGame(); requestAnimationFrame(gameLoop);
    }

    function showAuth() { document.getElementById('screen-intro').classList.add('hidden'); document.getElementById('screen-auth').classList.remove('hidden'); }
</script>
</body>
