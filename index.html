<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Village Architect: Master Builder</title>
    <style>
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; touch-action: none; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #1e3d1a; 
            position: fixed; font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        canvas { display: block; width: 100vw; height: 100vh; z-index: 1; }

        /* HUD */
        #hud {
            position: absolute; top: env(safe-area-inset-top, 10px);
            width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px;
            pointer-events: none; z-index: 10;
        }
        .stats-row { display: flex; gap: 10px; }
        .stat {
            background: rgba(45, 20, 10, 0.92); color: #f1c40f; padding: 8px 15px;
            border-radius: 15px; border: 2px solid #8b4513; font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4); font-size: 15px;
        }
        #xp-container {
            width: 70%; max-width: 250px; height: 10px; background: rgba(0,0,0,0.5);
            border-radius: 10px; border: 1px solid #fff; overflow: hidden;
        }
        #xp-bar { width: 0%; height: 100%; background: #2ecc71; transition: width 0.3s; }

        /* Custom Notification Box */
        #error-box {
            position: absolute; top: 110px; left: 50%; transform: translateX(-50%);
            background: rgba(192, 57, 43, 0.95); color: white; padding: 10px 20px;
            border-radius: 12px; font-weight: bold; font-size: 13px; z-index: 200;
            display: none; border: 2px solid #fff; text-align: center; min-width: 220px;
            animation: pop 0.3s ease; pointer-events: none;
        }
        @keyframes pop { 0% { transform: translateX(-50%) scale(0.8); } 100% { transform: translateX(-50%) scale(1); } }

        /* Full Screen Menus */
        .full-screen-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); z-index: 100;
            display: none; flex-direction: column; align-items: center;
            padding: 30px 15px; color: white;
        }
        .full-screen-menu.active { display: flex; }
        .item-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 12px; width: 100%; max-width: 450px; overflow-y: auto; padding: 10px;
        }
        
        .card {
            background: #f5deb3; border-radius: 12px; padding: 10px 5px;
            display: flex; flex-direction: column; align-items: center;
            border: 3px solid #8b4513; color: #333; position: relative;
        }
        .card.locked { background: #666; border-color: #333; opacity: 0.6; }
        .card.too-expensive { opacity: 0.5; }
        .card .icon { font-size: 30px; margin-bottom: 5px; }
        .card .name { font-size: 9px; font-weight: bold; text-align: center; height: 22px; }
        .card .price { font-weight: bold; font-size: 11px; color: #27ae60; }
        .card.too-expensive .price { color: #e74c3c; }
        .level-badge { position: absolute; top: -8px; background: #e74c3c; color: white; font-size: 9px; padding: 2px 6px; border-radius: 8px; border: 1px solid white; }

        /* Approval UI */
        #confirm-layer {
            position: absolute; bottom: 120px; width: 100%;
            display: none; justify-content: center; gap: 40px; z-index: 50;
        }
        .action-circle {
            width: 70px; height: 70px; border-radius: 50%; border: 4px solid white;
            display: flex; align-items: center; justify-content: center; font-size: 30px;
        }
        .btn-confirm { background: #2ecc71; color: white; }
        .btn-cancel { background: #e74c3c; color: white; }

        /* Bottom Toolbar */
        #controls {
            position: absolute; bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
            width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 10;
        }
        .btn {
            width: 65px; height: 65px; border-radius: 50%; border: 3px solid #fff;
            color: white; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; font-size: 11px; font-weight: bold;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }
        .btn-p { background: #2ecc71; } 
        .btn-h { background: #f1c40f; color: #8b4513; } 
        .btn-b { background: #8b4513; }
        .btn-d { background: #e74c3c; } 
    </style>
</head>
<body>

    <div id="hud">
        <div class="stats-row">
            <div class="stat">LVL <span id="p-level">1</span></div>
            <div class="stat">💰 $<span id="m-val">500</span></div>
        </div>
        <div id="xp-container"><div id="xp-bar"></div></div>
    </div>

    <div id="error-box"></div>

    <div id="confirm-layer">
        <div class="action-circle btn-cancel" onclick="cancelPlacement()">✕</div>
        <div class="action-circle btn-confirm" onclick="confirmPlacement()">✓</div>
    </div>

    <div id="seed-screen" class="full-screen-menu">
        <h2 style="color: #2ecc71;">Nursery</h2>
        <div id="seed-grid" class="item-grid"></div>
        <button onclick="closeMenus()" style="margin-top:20px; padding:12px 30px; border-radius:20px; border:none; background:#444; color:white;">BACK</button>
    </div>

    <div id="build-screen" class="full-screen-menu">
        <h2 style="color: #f1c40f;">Buildings</h2>
        <div id="build-grid" class="item-grid"></div>
        <button onclick="closeMenus()" style="margin-top:20px; padding:12px 30px; border-radius:20px; border:none; background:#444; color:white;">BACK</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div class="btn btn-p" onclick="openMenu('seed')">🌱<span>Sow</span></div>
        <div class="btn btn-h" onclick="startSpecialMode('harvest')">🧺<span>Pick</span></div>
        <div class="btn btn-b" onclick="openMenu('build')">🏗️<span>Build</span></div>
        <div class="btn btn-d" onclick="startSpecialMode('destroy')">🪓<span>Destroy</span></div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const TILE_SIZE = 80;
    const GRID_SIZE = 30; 
    const WORLD_SIZE = TILE_SIZE * GRID_SIZE;
    
    let money = 500;
    let playerLevel = 1;
    let xp = 0;
    let xpToNext = 100;
    let camera = { x: 0, y: 0 };
    let selectedItem = null;
    let previewPos = null;
    let errorTimeout;
    
    const player = { x: WORLD_SIZE/2, y: WORLD_SIZE/2, tx: WORLD_SIZE/2, ty: WORLD_SIZE/2, gx: 0, gy: 0, speed: 5 };

    const seeds = [
        { id: 'wheat', name: 'Wheat', price: 5, sale: 15, icon: '🌾', req: 1, xp: 10, persistent: false },
        { id: 'corn', name: 'Corn', price: 12, sale: 40, icon: '🌽', req: 2, xp: 20, persistent: false },
        { id: 'carrot', name: 'Carrot', price: 20, sale: 70, icon: '🥕', req: 3, xp: 35, persistent: false },
        { id: 'pumpkin', name: 'Pumpkin', price: 60, sale: 250, icon: '🎃', req: 5, xp: 100, persistent: false },
        { id: 'berry', name: 'Berry Bush', price: 40, sale: 30, icon: '🫐', req: 6, xp: 25, persistent: true },
        { id: 'apple', name: 'Apple Tree', price: 100, sale: 60, icon: '🍎', req: 7, xp: 70, persistent: true },
        { id: 'mango', name: 'Mango Tree', price: 300, sale: 180, icon: '🥭', req: 15, xp: 250, persistent: true }
    ];

    const catalog = [
        { id: 'plot', name: 'Farm Plot', price: 5, icon: '🟫', req: 1, xp: 5 },
        { id: 'path', name: 'Dirt Path', price: 2, icon: '👣', req: 1, xp: 2 },
        { id: 'house', name: 'Farmhouse', price: 80, icon: '🏡', req: 1, xp: 50 },
        { id: 'fence', name: 'Fence', price: 10, icon: '🚧', req: 2, xp: 5 },
        { id: 'well', name: 'Well', price: 40, icon: '⛲', req: 3, xp: 25 },
        { id: 'barn', name: 'Barn', price: 300, icon: '🏚️', req: 6, xp: 150 },
        { id: 'windmill', name: 'Windmill', price: 400, icon: '🎡', req: 10, xp: 300 },
        { id: 'fountain', name: 'Fountain', price: 3000, icon: '⛲', req: 20, xp: 2500 }
    ];

    const grid = Array.from({length: GRID_SIZE * GRID_SIZE}, (_, i) => ({
        x: i % GRID_SIZE, y: Math.floor(i / GRID_SIZE),
        type: 'grass', growth: 0, icon: '', cropData: null,
        color: (Math.floor(i / GRID_SIZE) + (i % GRID_SIZE)) % 2 === 0 ? '#4eb351' : '#45a848'
    }));

    function showNotification(msg) {
        const box = document.getElementById('error-box');
        box.innerText = msg; box.style.display = 'block';
        clearTimeout(errorTimeout);
        errorTimeout = setTimeout(() => { box.style.display = 'none'; }, 2500);
    }

    function startSpecialMode(type) {
        cancelPlacement();
        selectedItem = (type === 'harvest') ? { id: 'harv', icon: '🧺', type: 'harvest' } : { id: 'dest', icon: '🪓', type: 'destroy' };
        document.getElementById('confirm-layer').style.display = 'flex';
        previewPos = { gx: player.gx, gy: player.gy };
    }

    function openMenu(type) {
        cancelPlacement();
        const gridId = type === 'seed' ? 'seed-grid' : 'build-grid';
        const screenId = type === 'seed' ? 'seed-screen' : 'build-screen';
        const container = document.getElementById(gridId);
        container.innerHTML = '';
        const dataSet = type === 'seed' ? seeds : catalog;

        dataSet.forEach(item => {
            const isLocked = playerLevel < item.req;
            const tooExpensive = money < item.price;
            const card = document.createElement('div');
            card.className = `card ${isLocked ? 'locked' : ''} ${tooExpensive ? 'too-expensive' : ''}`;
            card.innerHTML = `${isLocked ? `<div class="level-badge">Lvl ${item.req}</div>`:''}<div class="icon">${item.icon}</div><div class="name">${item.name}</div><div class="price">$${item.price}</div>`;
            if(!isLocked && !tooExpensive) card.onclick = () => { closeMenus(); selectedItem = {...item, isSeed: type === 'seed', type: 'build'}; document.getElementById('confirm-layer').style.display='flex'; previewPos={gx:player.gx, gy:player.gy}; };
            container.appendChild(card);
        });
        document.getElementById(screenId).classList.add('active');
    }

    function confirmPlacement() {
        const tile = getTile(previewPos.gx, previewPos.gy);
        if(!tile) return;

        // 1. OBSTRUCTION CHECK: Block build if player is on target tile
        if (previewPos.gx === player.gx && previewPos.gy === player.gy) {
            showNotification("You are in the way!");
            return;
        }

        if (selectedItem.type === 'harvest') {
            if (tile.type === 'crop' && tile.growth >= 100) {
                money += tile.cropData.sale; addXP(tile.cropData.xp);
                if (tile.cropData.persistent) tile.growth = 0; else { tile.type = 'plot'; tile.cropData = null; }
            } else showNotification("Nothing to pick!");
        } 
        else if (selectedItem.type === 'destroy') {
            if (tile.type !== 'grass') { tile.type = 'grass'; tile.icon = ''; tile.cropData = null; tile.growth = 0; }
        }
        else if (selectedItem.isSeed) {
            if (tile.type === 'plot' && money >= selectedItem.price) {
                tile.type = 'crop'; tile.growth = 0; tile.cropData = selectedItem;
                money -= selectedItem.price; addXP(selectedItem.xp);
            } else showNotification("Plant on Farm Plots!");
        } else {
            if (tile.type === 'grass' && money >= selectedItem.price) {
                tile.type = (selectedItem.id === 'plot') ? 'plot' : (selectedItem.id === 'path' ? 'path' : 'building');
                tile.icon = selectedItem.icon;
                money -= selectedItem.price; addXP(selectedItem.xp);
            } else showNotification("Cannot build here!");
        }
        updateUI();
    }

    function addXP(amount) {
        xp += amount;
        if (xp >= xpToNext) { xp -= xpToNext; playerLevel++; xpToNext = Math.floor(xpToNext * 1.6); }
        updateUI();
    }

    function updateUI() {
        document.getElementById('m-val').innerText = money;
        document.getElementById('p-level').innerText = playerLevel;
        document.getElementById('xp-bar').style.width = (xp / xpToNext * 100) + "%";
    }

    function getTile(gx, gy) { return (gx>=0 && gx<GRID_SIZE && gy>=0 && gy<GRID_SIZE) ? grid[gy*GRID_SIZE+gx] : null; }
    
    function isWalkable(wx, wy) {
        const t = getTile(Math.floor(wx/TILE_SIZE), Math.floor(wy/TILE_SIZE));
        return t && t.type !== 'building';
    }

    canvas.addEventListener('touchstart', (e) => {
        const t = e.touches[0];
        const wx = t.clientX - camera.x; const wy = t.clientY - camera.y;
        const gx = Math.floor(wx/TILE_SIZE); const gy = Math.floor(wy/TILE_SIZE);

        if (selectedItem) {
            // ONLY MOVE PREVIEW (DO NOT MOVE PLAYER)
            previewPos = { gx, gy };
        } else {
            // ONLY MOVE PLAYER
            player.tx = Math.max(30, Math.min(wx, WORLD_SIZE-30));
            player.ty = Math.max(30, Math.min(wy, WORLD_SIZE-30));
        }
    });

    function cancelPlacement() { selectedItem = null; previewPos = null; document.getElementById('confirm-layer').style.display = 'none'; }
    function closeMenus() { document.querySelectorAll('.full-screen-menu').forEach(m => m.classList.remove('active')); }

    function update() {
        const dx = player.tx - player.x, dy = player.ty - player.y, dist = Math.sqrt(dx*dx+dy*dy);
        if(dist > player.speed) {
            const nx = player.x + (dx/dist)*player.speed, ny = player.y + (dy/dist)*player.speed;
            if(isWalkable(nx, player.y)) player.x = nx; if(isWalkable(player.x, ny)) player.y = ny;
        } else { player.x = player.tx; player.y = player.ty; }
        player.gx = Math.floor(player.x/TILE_SIZE); player.gy = Math.floor(player.y/TILE_SIZE);
        camera.x = Math.max(Math.min(0, -player.x + canvas.width/2), -(WORLD_SIZE - canvas.width));
        camera.y = Math.max(Math.min(0, -player.y + canvas.height/2), -(WORLD_SIZE - canvas.height));
        grid.forEach(t => { if(t.type === 'crop' && t.growth < 100) t.growth += 0.08; });
    }

    function draw() {
        ctx.fillStyle = '#1e3d1a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save(); ctx.translate(camera.x, camera.y);
        grid.forEach(t => {
            const tx = t.x*TILE_SIZE, ty = t.y*TILE_SIZE;
            if (tx + TILE_SIZE + camera.x < 0 || tx + camera.x > canvas.width || ty + TILE_SIZE + camera.y < 0 || ty + camera.y > canvas.height) return;
            if (t.type === 'path') { ctx.fillStyle = '#c2b280'; ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE); }
            else if (t.type === 'plot') { ctx.fillStyle = '#5d4037'; ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE); ctx.strokeStyle = '#4e362d'; ctx.strokeRect(tx+2, ty+2, TILE_SIZE-4, TILE_SIZE-4); }
            else if (t.type === 'crop') { ctx.fillStyle = '#5d4037'; ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE); }
            else { ctx.fillStyle = t.color; ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE); }
            
            if(t.type === 'crop') {
                if(t.cropData.persistent) {
                    ctx.font = '50px Arial'; ctx.textAlign='center'; ctx.fillText('🌳', tx+TILE_SIZE/2, ty+TILE_SIZE/2 + 10);
                    if(t.growth > 70) { ctx.font = `${10 + t.growth*0.3}px Arial`; ctx.fillText(t.cropData.icon, tx+TILE_SIZE/2, ty+TILE_SIZE/2 - 10); }
                } else {
                    const sz = 15 + t.growth * 0.4; ctx.font = `${sz}px Arial`; ctx.textAlign='center';
                    ctx.fillText(t.growth >= 100 ? t.cropData.icon : '🌱', tx+TILE_SIZE/2, ty+TILE_SIZE/2 + 10);
                }
            } else if(t.type === 'building') { ctx.font = '55px Arial'; ctx.textAlign='center'; ctx.fillText(t.icon, tx+TILE_SIZE/2, ty+TILE_SIZE/2 + 20); }
        });
        
        if (selectedItem && previewPos) {
            ctx.save(); ctx.globalAlpha = 0.4; const px = previewPos.gx*TILE_SIZE, py = previewPos.gy*TILE_SIZE;
            if (selectedItem.type === 'destroy') { ctx.fillStyle = 'red'; ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE); }
            else if (selectedItem.id === 'path') { ctx.fillStyle = '#c2b280'; ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE); }
            else if (selectedItem.id === 'plot') { ctx.fillStyle = '#5d4037'; ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE); }
            else { ctx.font = '55px Arial'; ctx.textAlign = 'center'; ctx.fillText(selectedItem.icon, px+TILE_SIZE/2, py+TILE_SIZE/2+20); }
            ctx.restore();
            ctx.strokeStyle = (selectedItem.type === 'destroy' || (previewPos.gx === player.gx && previewPos.gy === player.gy)) ? 'red' : 'white';
            ctx.lineWidth = 4; ctx.strokeRect(px+4, py+4, TILE_SIZE - 8, TILE_SIZE - 8);
        }

        ctx.strokeStyle = '#5d4037'; ctx.lineWidth = 15; ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);
        ctx.font = '55px Arial'; ctx.textAlign = 'center'; ctx.fillText('👨‍🌾', player.x, player.y + 15);
        ctx.restore();
        update(); requestAnimationFrame(draw);
    }
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    updateUI(); draw();
</script>
</body>
</html>
